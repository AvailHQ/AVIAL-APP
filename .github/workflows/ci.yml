name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: avail-prototype

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: avail-prototype/.nvmrc
          cache: npm
          cache-dependency-path: avail-prototype/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
